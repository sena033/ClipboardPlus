name: CI

on: [push, pull_request]

jobs:
  build-desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
        with:
          # Avoid recursive submodule update at checkout. Some runners
          # fail early when .gitmodules/submodule metadata is inconsistent
          # ("No url found for submodule path ..."). The workflow builds
          # raylib explicitly below by cloning it, so disable submodule
          # auto-update here to prevent early failures.
          submodules: false
          fetch-depth: 0
      - name: Setup MSYS2 and build tools
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-make
            git
      - name: Build raylib from source (windows)
        shell: bash
        run: |
          set -e
          git clone --depth 1 https://github.com/raysan5/raylib.git /tmp/raylib
          mkdir -p /tmp/raylib/build && cd /tmp/raylib/build
          cmake -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -DCMAKE_INSTALL_PREFIX=/tmp/raylib-install ..
          mingw32-make -j$(nproc)
          mingw32-make install
      - name: CMake configure
        shell: bash
        run: |
      set -e
      mkdir -p build && cd build
      # Force MinGW Makefiles generator so mingw32-make finds a Makefile
      # (without -G CMake may choose Visual Studio generator on hosted
      # Windows runners which produces no Makefile for mingw32-make).
      # Ensure CMake can find raylib's installed config files and build type
      cmake -G "MinGW Makefiles" .. \
        -DCMAKE_PREFIX_PATH=/tmp/raylib-install \
        -Draylib_DIR=/tmp/raylib-install/lib/cmake/raylib \
        -DCMAKE_BUILD_TYPE=Release
      - name: Build
        shell: bash
        run: |
          set -e
          cd build
          mingw32-make -j$(nproc)
      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: secondbrain-windows
          path: build/secondbrain.exe

  # Android build removed temporarily: building raylib+NDK in CI requires
  # additional runner setup (X11 deps, submodules or a prebuilt raylib for
  # Android). Restore this job once the project provides an Android toolchain
  # or prebuilt raylib libraries in the repo.
