name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: clipboard-plus
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: clipboard-plus/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npx vite build

      - name: Package Electron app
        run: npx electron-builder --win --config --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: clipboard-plus/release/*.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
